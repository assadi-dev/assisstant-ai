services:
  postgres:
    image: postgres:17-alpine
    container_name: assistant_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: assistant_ai
    ports:
      - "5432:5432"
    volumes:
      - assistant_ai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assistant_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  assistant_ai_pgdata:
